<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Rating</title>

<style>
    body {
    font-family: Arial, sans-serif;
    background: #e8f4ff;
    padding: 30px;
}

    form {
    max-width: 650px;
    margin: auto;
    background: white; 
    padding: 25px;
    border-radius: 10px;
    height: 600px;
    overflow-y: auto;   
    border: 4px solid #caa44b; 
} 

    label {
    display: block;
    margin-top: 12px;
}

    input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
    border-radius: 30px;
    border: 1px solid #aaa;
    box-sizing: border-box;
}

    input:focus, select:focus, textarea:focus {
    outline: none;
    border: 2px solid #5aa9e6;
    background-color: #f2faff;
}

    .error {
    border: 2px solid red !important;
    background-color: #ffe5e5;
}

    .buttons {
    text-align: center;
    margin-top: 15px;
}

    button {
    padding: 10px 25px;
    margin: 10px;
    border: none;
    border-radius: 5px;
    background: #00008b;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

    button:hover {
    background: #5aa9e6;
}

    .star {
    font-size: 25px;
    color: #ccc;
    cursor: pointer;
}

    .star:hover,
    .star.active {
    color: gold;
}

    .form-heading {
    font-size: 40px;       
    font-weight: bold;     
    color: #000000;       
    text-align: center;     
    margin-bottom: 30px;    
}
</style>

<form id = "movieForm">
<h1 class="form-heading">Add a Movie</h1>

<label>Title:
    <input type="text" id="theTitle" required onblur="checkEmpty(this)">
</label>

<label>Year:
    <input type="number" id="theYear" required onblur="checkEmpty(this)">
</label>

<label> Genre:
    <select id="theGenre" required>
        <option value="Action"> Action </option>
        <option value="Horror"> Horror </option>
        <option value="Fantasy"> Fantasy </option>
        <option value="Drama"> Drama </option>
        <option value="Thriller">Thriller </option>
        <option value="Romance">Romance</option>
        <option value="Sci-Fi">Sci-Fi</option>
    </select>
</label>

<label id="theStarRating">
    <span class="star" data-value="1"> &#9733; </span>
    <span class="star" data-value="2"> &#9733; </span>
    <span class="star" data-value="3"> &#9733; </span>
    <span class="star" data-value="4"> &#9733; </span>
    <span class="star" data-value="5"> &#9733; </span>
</label>

<div class="buttons">
    <button type="submit">Add Movie</button>
</div>
<h1 class="form-heading">Movie List</h1>
<div id="movieDisplay"></div>
</form>

<script>
    const ratingstar = document.querySelectorAll('#theStarRating .star');
    let valueStar = [];
    ratingstar.forEach((star) => {
        star.addEventListener('click', () => {
            const value = parseInt(star.dataset.value);
            ratingstar.forEach(s => s.classList.remove('active'));
            ratingstar.forEach(s => {
                if (parseInt(s.dataset.value) <= value) {
                    s.classList.add('active');
                }
            });
            valueStar = Array.from(document.querySelectorAll('#theStarRating .star.active'));
        });
    });
    function Submit() {
        const valueTitle = document.getElementById("theTitle").value.trim();
        const valueYear = document.getElementById("theYear").value;
        const valueGenre = document.getElementById("theGenre").value;
        const newValueStar = valueStar.length;
        let movies = JSON.parse(localStorage.getItem('movies')) || [];
        /* This is my first comment in all time, I think. The line of code after this is case insensitive. 
        Sorry, ma'am, if this is supposed to be case sensitive TT. */
        const existingMovieIndex = movies.findIndex(m => m.title.toLowerCase() === valueTitle.toLowerCase());
        if (existingMovieIndex !== -1) {
            const movie = movies[existingMovieIndex];
            movie.year = valueYear;
            movie.genre = valueGenre;
            if (!Array.isArray(movie.allRatings)) {
                movie.allRatings = [movie.rating];
            }
            movie.allRatings.push(newValueStar);
            const sum = movie.allRatings.reduce((a, b) => a + b, 0);
            movie.rating = sum / movie.allRatings.length;
        }
        else {
            const movieList = {
                title: valueTitle,
                year: valueYear,
                genre: valueGenre,
                /* I think I'm overexplaining. The 'numerical data' of the rating is also displayed, 
                to show why the average is either rounded up or down in the yellow stars displayed. */
                rating: newValueStar,
                allRatings: [newValueStar]
            };       
        movies.push(movieList);
        }
        localStorage.setItem('movies', JSON.stringify(movies));
        console.log("Movie database:", movies);
        displayMovies();
        document.getElementById("movieForm").reset();
        ratingstar.forEach(s => s.classList.remove('active'));
        valueStar = [];
    }
    document.getElementById('movieForm').addEventListener('submit', function(e){
        e.preventDefault();
        Submit();
    });
    function createStars(rating) {
        let stars = "";
        const averageRating = Math.round(rating);
        for (let i = 1; i <= 5; i++) {
            if (i <= averageRating) {
                stars += '<span class="star active">&#9733;</span>';
            }
            else {
                stars += '<span class="star">&#9733;</span>';
            }
        }
        return `(${rating.toFixed(1)}) ${stars}`;
    }
    function displayMovies() {
        const movieDisplay = document.getElementById("movieDisplay");
        const movies = JSON.parse(localStorage.getItem("movies")) || [];
        movieDisplay.innerHTML = "";
        movies.forEach((movie, i) => {
            const movieDiv = document.createElement("div");
            movieDiv.innerHTML = `
                <p>Title: ${movie.title}, Year: (${movie.year}), Genre: ${movie.genre}, Rating: ${createStars(movie.rating)} <button type="button" onclick="Delete(${i})" style="background: #cc0000; padding: 5px 10px; margin-left: 10px;">Delete</button> </p>
                <hr>`;
                movieDisplay.appendChild(movieDiv); 
                });
    }
    function Delete(index) {
        const Ok = confirm("Are you sure you want to delete?");
        if (Ok){
            let movies = JSON.parse(localStorage.getItem('movies')) || [];
            movies.splice(index, 1);
            localStorage.setItem('movies', JSON.stringify(movies));
            displayMovies();
        }
    }
    function checkEmpty(element) {
        if (element.value.trim() === "") {
            element.classList.add("error");
        } else {
            element.classList.remove("error");
        }
    }
    displayMovies();
</script>
</body>
</html>
