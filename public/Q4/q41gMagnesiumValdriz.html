<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Rating</title>

<style>
    body {
    font-family: Arial, sans-serif;
    background: #e8f4ff;
    padding: 30px;
}

    form {
    max-width: 650px;
    margin: auto;
    background: white; 
    padding: 25px;
    border-radius: 10px;
    height: 600px;
    overflow-y: auto;   
    border: 4px solid #caa44b; 
} 

    fieldset {
    border: 2px solid #5aa9e6; 
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 8px;
}

    legend {
    font-weight: bold;
    color: #caa44b;
}

    label {
    display: block;
    margin-top: 12px;
}

    input:not([type="radio"]), select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
    border-radius: 30px;
    border: 1px solid #aaa;
    box-sizing: border-box;
}

    input:focus, select:focus, textarea:focus {
    outline: none;
    border: 2px solid #5aa9e6;
    background-color: #f2faff;
}

    .error {
    border: 2px solid red !important;
    background-color: #ffe5e5;
}

    .buttons {
    text-align: center;
    margin-top: 15px;
}

    button {
    padding: 10px 25px;
    margin: 10px;
    border: none;
    border-radius: 5px;
    background: #caa44b;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

    button:hover {
    background: #5aa9e6;
}

    .star {
    font-size: 25px;
    color: #ccc;
    cursor: pointer;
}

    .star:hover,
    .star.active {
    color: gold;
}
</style>

<script>
    function Submit() {
        movieList = {};
        text.push(movieList);
        year.push(movieList);
        genre.push(movieList);

    }
    
    function checkEmpty(element) {
        if (element.value.trim() === "") {
            element.classList.add("error");
        } else {
            element.classList.remove("error");
        }
    }
    
</script>

<fieldset>
    <legend>Add a Movie</legend>

<label>Title:
    <input type="text" required onblur="checkEmpty(this)">
</label>

<label>Year:
    <input type="number" required onblur="checkEmpty(this)">
</label>

<label> Genre:
    <select required>
        <option value="action"> Action </option>
        <option value="horror"> Horror </option>
        <option value="fantasy"> Fantasy </option>
        <option value="drama"> Drama </option>
        <option value="thriller">Thriller </option>
        <option value="romance">Romance</option>
        <option value="sci-fi">Sci-Fi</option>
    </select>
</label>

<label>
    <span class="star" data-value="1"> &#9733; </span>
    <span class="star" data-value="2"> &#9733; </span>
    <span class="star" data-value="3"> &#9733; </span>
    <span class="star" data-value="4"> &#9733; </span>
    <span class="star" data-value="5"> &#9733; </span>
</label>

<div class="buttons">
    <button type="submit">Add Movie</button>
</div>

</form>

</body>
</html>
